1. **특수교육 대상 학생의 인지 수준에 맞는 언어**: 추상적 개념보다 구체적·감각적 표현을 사용하세요.
   - 나쁜 예: "민주주의의 본질은 무엇인가?"
   - 좋은 예: "우리 반에서 간식을 고를 때 어떻게 하면 모두가 좋아할까?"

2. **출발 질문**: 반드시 학생의 일상 경험(학교생활, 가정생활, 지역사회)에서 출발하세요.
   - 특수교육 대상 학생은 정답 부담이 없는 열린 질문에서 참여도가 높아집니다.

3. **전개 질문**: 구체적 조작 활동(만지기, 세기, 분류하기 등)과 연결하세요.
   - 블룸의 분류 체계에서 '적용' 이상 수준을 포함하되, 구체물 조작으로 접근 가능해야 합니다.

4. **도착 질문**: "~하면 어떨까?", "~해볼까?" 형태의 실천적 질문을 사용하세요.
   - 특수교육 대상 학생이 자신의 삶에서 즉시 실천할 수 있는 구체적 행동을 떠올리게 하세요.

5. **유도 질문, 모호한 질문, 복합형 질문, 위협적 질문은 절대 사용하지 마세요.**

6. **2022 개정 기본 교육과정의 성취기준과 핵심 아이디어를 반영하세요.**

7. **보완대체의사소통(AAC)을 사용하는 학생도 참여할 수 있도록**, 시각적 단서나 선택지를 포함한 질문 변형을 교육적 의도에 안내하세요.

## 스타일 및 톤
- 친근하고 응원하는 피어(Peer) 톤: 선생님의 수업 고민을 함께 해결하는 든든한 동료 AI
- 각 질문은 짧고 명확하게 (한 문장, 최대 두 문장)
- 교육적 의도는 해당 질문의 교육학적 근거와 특수교육적 배려를 설명`;
    }

    // ═══════════════════════════════════════
    // Generate
    // ═══════════════════════════════════════
    async function generate() {
      const subject = document.getElementById('subject').value;
      const grade = document.getElementById('grade').value;
      const topic = document.getElementById('topic').value.trim();
      const btn = document.getElementById('generateBtn');
      const errorEl = document.getElementById('errorMsg');

      errorEl.classList.remove('show');

      if (!subject || !grade || !topic) {
        showError('교과, 학년군, 학습 주제를 모두 입력해 주세요.');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const userMessage = `[교과: ${subject}], [학년군: ${grade}], [학습 주제: ${topic}]`;

        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${_K}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              system_instruction: { parts: [{ text: buildSystemPrompt() }] },
              contents: [{ parts: [{ text: userMessage }] }],
              generationConfig: {
                temperature: 0.8,
                topP: 0.95,
                maxOutputTokens: 2048,
                responseMimeType: "application/json"
              }
            })
          }
        );

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData?.error?.message || `오류가 발생했습니다 (${response.status})`);
        }

        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!text) throw new Error('응답을 생성하지 못했습니다. 다시 시도해 주세요.');

        const result = JSON.parse(text);
        renderResult(result);

      } catch (err) {
        console.error(err);
        showError(err.message || '오류가 발생했습니다. 다시 시도해 주세요.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // ═══════════════════════════════════════
    // Render
    // ═══════════════════════════════════════
    function renderResult(result) {
      const container = document.getElementById('resultContent');
      const area = document.getElementById('resultArea');

      const steps = [
        { num: 1, label: '핵심 질문 · Essential', cls: 'step-essential' },
        { num: 2, label: '출발 질문 · Opening', cls: 'step-opening' },
        { num: 3, label: '전개 질문 · Developmental', cls: 'step-develop' },
        { num: 4, label: '도착 질문 · Closing', cls: 'step-closing' }
      ];

      let html = '';

      // Intro
      if (result.intro) {
        html += `<div class="intro-text"><strong>${result.title || ''}</strong><br>${result.intro}</div>`;
      }

      // Cards
      if (result.questions?.length) {
        result.questions.forEach((q, i) => {
          const s = steps[i] || { num: i+1, label: q.type, cls: '' };
          html += `
            <div class="question-card">
              <div class="card-step ${s.cls}">
                <span class="step-number">${s.num}</span>
                <span class="step-label">${s.label}</span>
              </div>
              <div class="question-text">"${q.question}"</div>
              <div class="intent-text"><strong>교육적 의도</strong> — ${q.intent}</div>
            </div>`;
        });
      }

      // Reference
      if (result.reference) {
        html += `<div class="reference">📚 ${result.reference}</div>`;
      }

      container.innerHTML = html;
      area.classList.add('show');
      area.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ═══════════════════════════════════════
    // Copy
    // ═══════════════════════════════════════
    function copyResult() {
      const container = document.getElementById('resultContent');
      const cards = container.querySelectorAll('.question-card');
      const introEl = container.querySelector('.intro-text');

      let text = introEl ? introEl.textContent.trim() + '\n\n---\n\n' : '';

      cards.forEach(card => {
        const label = card.querySelector('.step-label').textContent;
        const question = card.querySelector('.question-text').textContent;
        const intent = card.querySelector('.intent-text').textContent;
        text += `### ${label}\n> ${question}\n${intent}\n\n---\n\n`;
      });

      const ref = container.querySelector('.reference');
      if (ref) text += ref.textContent;

      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyBtn');
        const original = btn.textContent;
        btn.textContent = '복사 완료 ✓';
        setTimeout(() => { btn.textContent = original; }, 2000);
      });
    }

    // ═══════════════════════════════════════
    // Error
    // ═══════════════════════════════════════
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 6000);
    }
  </script>
